{{/*
Legacy password secret - kept for backward compatibility with existing deployments
This secret is now deprecated in favor of separate database and broker secrets
*/}}
{{- if or (.Values.database.components.password) (.Values.postgresql.enabled) (.Values.broker.components.password) (.Values.rabbitmq.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helper.fullname" . }}-passwords-legacy
  labels:
    {{- include "helper.labels" (dict "root" . "componentName" "api") | nindent 4 }}
    app.kubernetes.io/component: passwords
    async-api.io/type: configuration
  annotations:
    helm.sh/resource-policy: keep
    async-api.io/deprecated: "true"
    async-api.io/migration-note: "Use separate database and broker secrets instead"
type: Opaque
data:
  {{- if or (.Values.database.components.password) (.Values.postgresql.enabled) }}
  db-password: {{ (.Values.database.components.password | default .Values.postgresql.auth.password | default "asynctask123") | b64enc | quote }}
  {{- end }}
  {{- if or (.Values.broker.components.password) (.Values.rabbitmq.enabled) }}
  broker-password: {{ (.Values.broker.components.password | default .Values.rabbitmq.auth.password | default "kalo") | b64enc | quote }}
  {{- end }}
{{- end }}
