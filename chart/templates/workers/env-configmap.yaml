{{- range .Values.workers }}
{{- if .enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-worker-%s-env-config" (include "helper.fullname" $) .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "helper.labels" (dict "root" $ "componentName" "worker") | nindent 4 }}
    worker.name: {{ .name }}
    async-api.io/resource-type: configuration
    async-api.io/type: environment
data:
  # Broker configuration - individual components for workers
  BROKER_HOST: {{ include "chart.brokerHost" $ | quote }}
  BROKER_PORT: {{ include "chart.brokerPort" $ | quote }}
  BROKER_USERNAME: {{ include "chart.brokerUsername" $ | quote }}
  BROKER_VHOST: {{ include "chart.brokerVhost" $ | quote }}
  BROKER_SCHEME: {{ include "chart.brokerScheme" $ | quote }}
{{- end }}
{{- end }}
