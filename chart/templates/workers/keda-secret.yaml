{{ if .Capabilities.APIVersions.Has "keda.sh/v1alpha1" -}}
{{- range .Values.workers }}
{{- if and .enabled .kedaAutoscaler.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-worker-%s-keda-credentials" (include "helper.fullname" $) .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "helper.labels" (dict "root" $ "componentName" "worker") | nindent 4 }}
    worker.name: {{ .name }}
    async-api.io/resource-type: keda-credentials
type: Opaque
data:
  broker-username: {{ include "chart.brokerUsername" $ | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
