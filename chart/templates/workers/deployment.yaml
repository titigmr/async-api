{{- range .Values.workers }}
{{- if and .enabled (eq .type "deployment") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-worker-%s" (include "helper.fullname" $) .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "helper.labels" (dict "root" $ "componentName" "worker") | nindent 4 }}
    worker.name: {{ .name }}
    async-api.io/type: worker
    async-api.io/worker-type: {{ .type }}
  {{- if not (and .kedaAutoscaler .kedaAutoscaler.enabled) }}
  replicas: {{ .deploymentSpec.replicas | default 1 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "helper.selectorLabels" (dict "root" $ "componentName" "worker") | nindent 6 }}
      worker.name: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "helper.selectorLabels" (dict "root" $ "componentName" "worker") | nindent 8 }}
        worker.name: {{ .name }}
        {{- if (and .deploymentSpec .deploymentSpec.podAnnotations) }}
      annotations:
        {{- toYaml .deploymentSpec.podAnnotations | nindent 8 }}
        {{- end }}
      {{- if (and .deploymentSpec .deploymentSpec.podLabels) }}
        {{- toYaml .deploymentSpec.podLabels | nindent 8 }}
        {{- end }}
    spec:
      {{- if (and .role .role.create) }}
      serviceAccountName: {{ printf "%s-worker-%s" (include "helper.fullname" $) .name }}
      {{- end }}
      {{- if (and .deploymentSpec .deploymentSpec.nodeSelector) }}
      nodeSelector:
        {{- toYaml .deploymentSpec.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if (and .deploymentSpec .deploymentSpec.tolerations) }}
      tolerations:
        {{- toYaml .deploymentSpec.tolerations | nindent 8 }}
      {{- end }}
      {{- if (and .deploymentSpec .deploymentSpec.affinity) }}
      affinity:
        {{- toYaml .deploymentSpec.affinity | nindent 8 }}
      {{- end }}
      {{- if (and .deploymentSpec .deploymentSpec.securityContext) }}
      securityContext:
        {{- toYaml .deploymentSpec.securityContext | nindent 8 }}
      {{- end }}
      containers:
      - name: worker
        image: "{{ (((.deploymentSpec).image).repository | default ((($.Values.global).image).repository) | default "async-api") }}:{{ (((.deploymentSpec).image).tag | default ((($.Values.global).image).tag) | default "latest") }}"
        imagePullPolicy: {{ (((.deploymentSpec).image).pullPolicy | default ((($.Values.global).image).pullPolicy) | default "IfNotPresent") }}
        envFrom:
        - configMapRef:
            name: {{ printf "%s-worker-%s-env-config" (include "helper.fullname" $) .name }}
        {{- if (and .deploymentSpec .deploymentSpec.envFromConfigMap) }}
        {{- range .deploymentSpec.envFromConfigMap }}
        - configMapRef:
            name: {{ .configMapRef.name }}
            {{- if .configMapRef.optional }}
            optional: {{ .configMapRef.optional }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if (and .deploymentSpec .deploymentSpec.envFromSecret) }}
        {{- range .deploymentSpec.envFromSecret }}
        - secretRef:
            name: {{ .secretRef.name }}
            {{- if .secretRef.optional }}
            optional: {{ .secretRef.optional }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if $.Values.broker.urlFromSecret.name }}
        - secretRef:
            name: {{ $.Values.broker.urlFromSecret.name }}
        {{- else }}
        {{- if or $.Values.broker.url $.Values.broker.components.host $.Values.rabbitmq.enabled }}
        - secretRef:
            name: {{ printf "%s-broker" (include "helper.fullname" $) }}
        {{- end }}
        {{- end }}
        {{- if and $.Values.rabbitmq.enabled (not $.Values.rabbitmq.auth.password) (not $.Values.broker.urlFromSecret.name) }}
        - secretRef:
            name: {{ include "chart.rabbitmq.fullname" $ }}
        {{- end }}
        env:
        {{- if (and .deploymentSpec .deploymentSpec.env) }}
        {{- range .deploymentSpec.env }}
        - name: {{ .name }}
          value: {{ tpl .value $ | quote }}
        {{- end }}
        {{- end }}
        {{- if (and .metrics .metrics.enabled) }}
        ports:
        - name: metrics
          containerPort: {{ .metrics.port }}
          protocol: TCP
        {{- end }}
        {{- if (and .deploymentSpec .deploymentSpec.resources) }}
        resources:
          {{- toYaml .deploymentSpec.resources | nindent 10 }}
        {{- end }}
        {{- if .extraVolumes }}
        volumeMounts:
        {{- range .extraVolumes }}
        - name: {{ .name }}
          mountPath: {{ .mountPath }}
          {{- if .subPath }}
          subPath: {{ .subPath }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- if (and .metrics .metrics.enabled) }}
        livenessProbe:
          httpGet:
            path: {{ .metrics.path }}
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: {{ .metrics.path }}
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- else if .probes }}
        {{- if .probes.livenessProbe }}
        livenessProbe:
          {{- toYaml .probes.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if .probes.readinessProbe }}
        readinessProbe:
          {{- toYaml .probes.readinessProbe | nindent 10 }}
        {{- end }}
        {{- if .probes.startupProbe }}
        startupProbe:
          {{- toYaml .probes.startupProbe | nindent 10 }}
        {{- end }}
        {{- end }}
      {{- if .extraVolumes }}
      volumes:
      {{- range .extraVolumes }}
      - name: {{ .name }}
        {{- if .emptyDir }}
        emptyDir:
          {{- toYaml .emptyDir | nindent 10 }}
        {{- else if .configMap }}
        configMap:
          name: {{ tpl .configMap.name $ }}
          {{- if .configMap.items }}
          items:
            {{- toYaml .configMap.items | nindent 12 }}
          {{- end }}
          {{- if .configMap.defaultMode }}
          defaultMode: {{ .configMap.defaultMode }}
          {{- end }}
        {{- else if .secret }}
        secret:
          secretName: {{ tpl .secret.secretName $ }}
          {{- if .secret.items }}
          items:
            {{- toYaml .secret.items | nindent 12 }}
          {{- end }}
          {{- if .secret.defaultMode }}
          defaultMode: {{ .secret.defaultMode }}
          {{- end }}
        {{- else if .persistentVolumeClaim }}
        persistentVolumeClaim:
          claimName: {{ .persistentVolumeClaim.claimName }}
        {{- else if .hostPath }}
        hostPath:
          path: {{ .hostPath.path }}
          {{- if .hostPath.type }}
          type: {{ .hostPath.type }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- end }}
{{- end }}
{{- end }}
